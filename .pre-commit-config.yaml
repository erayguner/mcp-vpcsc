# Comprehensive pre-commit hooks for vpcsc-mcp.
#
# Install once:
#   uv run pre-commit install
#   uv run pre-commit install --hook-type commit-msg
#
# Run on demand:
#   uv run pre-commit run --all-files
#
# Slow hooks (pytest, allowlist drift) are gated to the `manual` stage —
# run them explicitly with `pre-commit run --hook-stage manual`.

default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: "3.5.0"

repos:
  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        exclude: \.pdf$
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^examples/adk-agent/evals/
      - id: check-json
      - id: check-toml
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: debug-statements
      - id: detect-private-key
        # These fixtures contain fake keys used to test redaction — not real secrets.
        exclude: ^tests/(test_input_filters|test_safety)\.py$
      - id: forbid-submodules

  # Python — ruff replaces black/isort/flake8/pyupgrade
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # Python pygrep — fast static checks
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-no-eval
      - id: python-no-log-warn
      - id: python-use-type-annotations
      - id: rst-backticks
      - id: rst-directive-colons

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # GitHub Actions workflows
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # Shell scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # Dockerfile
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3013]

  # Terraform — format only here. tflint + tfsec run in CI (.github/workflows/ci.yml)
  # and terraform_validate is skipped because it needs network access for `init`.
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt

  # Conventional commit message check
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict, feat, fix, chore, docs, refactor, perf, test, ci, build, revert]

  # Project-specific local hooks
  - repo: local
    hooks:
      # Governance: prevent silent expansion of the gcloud allowlist.
      - id: allowlist-drift
        name: gcloud allowlist drift check
        entry: uv run python scripts/check_allowlist_drift.py
        language: system
        pass_filenames: false
        files: ^src/vpcsc_mcp/tools/safety\.py$
        stages: [pre-commit, manual]

      # Full pytest — gated to manual to keep pre-commit fast.
      - id: pytest-fast
        name: pytest (manual)
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        stages: [manual]

      # Server import sanity — catches broken tool registrations.
      - id: server-import
        name: server import check
        entry: uv run python -c "from vpcsc_mcp.server import mcp; print(mcp.name)"
        language: system
        pass_filenames: false
        files: ^src/vpcsc_mcp/.*\.py$
