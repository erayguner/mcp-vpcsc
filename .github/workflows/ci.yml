name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run pytest

  allowlist-drift:
    # Fail if the gcloud subcommand/flag allowlist has widened without the
    # baseline being updated in the same PR (governance framework §16.2).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.13
      - name: Install project
        run: uv sync --frozen --extra dev
      - name: Check allowlist drift
        run: uv run python scripts/check_allowlist_drift.py

  terraform-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v5
        with:
          tflint_version: v0.58.0
      - name: TFLint
        working-directory: terraform
        run: |
          tflint --init
          tflint --recursive

  terraform-sec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false

  docker-build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t vpcsc-mcp:${{ github.sha }} .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: vpcsc-mcp:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  sign-and-push:
    # Build, push to GHCR, and sign with keyless cosign on main pushes only.
    # Framework §12.3 — SLSA ≥ L2, container images signed; admission verifies.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-and-test, docker-build-and-scan, allowlist-drift]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # for keyless cosign via OIDC
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image refs
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO_LOWER}/vpcsc-mcp" >> $GITHUB_OUTPUT
          echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign --yes "${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
