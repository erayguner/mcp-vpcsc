name: Feature Request
description: Suggest a new tool, resource, prompt, or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the feature and its motivation.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New tool
        - New resource
        - New prompt
        - Existing tool improvement
        - Security
        - Deployment / infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve or what use case does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this to work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, references, or screenshots.
