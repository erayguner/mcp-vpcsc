name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of vpcsc-mcp are you using?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      description: How are you running the server?
      options:
        - stdio (local)
        - streamable-http (Cloud Run)
        - SSE
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - "3.14"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Run `uv run vpcsc-mcp ...`
        2. Call tool X with parameters ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant logs. Redact sensitive information.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context — environment, screenshots, related issues.
